    <script>
      // Suppress cross-origin and iframe sandbox-induced 'Script error.' logs
      // that are generated by browser security constraints, third-party extensions, or WebSockets.
      window.onerror = function(message, source, lineno, colno, error) {
        const msgStr = String(message);
        if (msgStr.indexOf('Script error') !== -1 || !source) {
          console.warn('Gracefully intercepted and suppressed cross-origin iframe error:', message);
          return true; // Prevents propagation to parent window/iframe handlers
        }
        return false;
      };
      
      window.addEventListener('error', function(e) {
        const msgStr = String(e.message || '');
        if (msgStr.indexOf('Script error') !== -1) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        const reasonStr = e.reason ? String(e.reason.message || e.reason) : '';
        if (reasonStr.indexOf('Script error') !== -1) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);

      // Only load AdSense if not running inside an iframe (like AI Studio preview)
      // to prevent sandbox security policy blocks and untraceable 'Script error' logs.
      if (window.self === window.top) {
        const adScript = document.createElement("script");
        adScript.async = true;
        adScript.src = "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9552509372228899";
        adScript.crossOrigin = "anonymous";
